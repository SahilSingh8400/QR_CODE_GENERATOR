<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Code Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card bg-black text-light border-secondary shadow-lg p-4 w-100" style="max-width: 1000px;">

        <div class="text-center mb-4">
            <h1>Text to QR Code Generator</h1>
            <h5>Made with ❤️ by Sahil Singh</h5>
        </div>

        <div class="row align-items-center">

            <!-- Form Section -->
            <div class="col-md-6">

                <form method="POST">

                    <div class="mb-3">
                        <label for="text" class="form-label">
                            <h4>Text</h4>
                        </label>

                        <input
                            type="text"
                            name="text"
                            id="text"
                            class="form-control"
                            placeholder="Enter text here..."
                            required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Generate QR
                    </button>

                </form>

            </div>

            <!-- QR Section -->
            <div class="col-md-6 text-center">

                {% if qr_code %}

                    <h4 class="mb-3">Generated QR Code</h4>

                    <img
                        src="{{ url_for('static', filename=qr_code) }}"
                        alt="QR Code"
                        class="img-fluid border bg-white p-2"
                        style="max-width:250px;">

                    <div class="mt-3">
                        <a
                            href="{{ url_for('static', filename=qr_code) }}"
                            download="qr_code.png"
                            class="btn btn-success">
                            Download QR Code
                        </a>
                    </div>

                {% else %}

                    <h5 class="text-secondary">
                        QR Code will appear here
                    </h5>

                {% endif %}

            </div>

        </div>

        <hr class="my-4">

        <!-- Contact Section -->
        <div class="text-center">

            <h5>Want to suggest an improvement?</h5>

            <a
                href="mailto:optimus98099@gmail.com?subject=QR Generator Feedback"
                class="text-info text-decoration-none fs-5">
                📧 optimus98099@gmail.com
            </a>

        </div>

    </div>

</div>

</body>
</html>
